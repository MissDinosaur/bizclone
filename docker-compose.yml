services:
  # PostgreSQL Database
  postgres_db:
    image: postgres:16-alpine
    container_name: bizclone_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bizclone_network

  # BizClone Application
  bizclone:
    build: .
    container_name: bizclone_app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config/gmail:/app/config/gmail:ro
    networks:
      - bizclone_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  bizclone_network:
    driver: bridge
